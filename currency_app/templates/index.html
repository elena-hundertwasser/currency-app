<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Конвертер валют</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5 p-4 bg-white rounded shadow">
    <h2 class="text-center mb-4">Конвертер валют</h2>

    <input id="amount" class="form-control mb-3" placeholder="Сумма">
    <input id="from" class="form-control mb-3" placeholder="USD">
    <input id="to" class="form-control mb-3" placeholder="EUR">

    <button class="btn btn-primary w-100 mb-2" onclick="convert()">Конвертировать</button>
    <button class="btn btn-secondary w-100" onclick="updateRates()">Обновить курсы</button>

    <h4 id="result" class="mt-3 text-success"></h4>
    <p id="time" class="text-muted"></p>
</div>

<script src="/static/script.js"></script>

</body>
</html>
